<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FT API Platform</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
radial-gradient(circle at top,#1e3a8a,#0a0a0a);
}

.hero h1{
font-size:70px;
font-weight:900;
}

.hero p{
margin-top:20px;
opacity:.8;
}

.btn{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:15px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:18px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:60px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:25px;
padding:30px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.stats{
display:flex;
justify-content:center;
gap:40px;
padding:50px;
flex-wrap:wrap;
}

.stat{
text-align:center;
}

.number{
font-size:48px;
font-weight:bold;
color:#3b82f6;
}
</style>
</head>
<body>

<section class="hero">
<h1>FT API PLATFORM</h1>
<p>Professional API Management & Analytics</p>
<button class="btn">Get Started</button>
</section>

<section class="stats">
<div class="stat">
<div class="number">10K+</div>
Users
</div>

<div class="stat">
<div class="number">50M+</div>
Requests
</div>

<div class="stat">
<div class="number">99.9%</div>
Uptime
</div>
</section>

<section class="cards">

<div class="card">
<h2>API Keys</h2>
<p>Create and manage API keys.</p>
</div>

<div class="card">
<h2>Analytics</h2>
<p>Track usage and requests.</p>
</div>

<div class="card">
<h2>Security</h2>
<p>Rate limits and protection.</p>
</div>

<div class="card">
<h2>Dashboard</h2>
<p>Business-grade monitoring.</p>
</div>

</section>

</body>
</html>
